<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordly</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head> 
<body>
    <h1 class="text-center mt-5 mb-4">Wordly</h1>
    <div class="d-flex flex-column align-items-center">
            <input type="text" id="user-input" class="form-control w-50 p-2" placeholder="Type a word" title="Search a word">
            <div class="d-grid col-1 mx-auto">
                <button id="search" title="Search" class="btn btn-secondary my-3 p-2">Search</button>
            </div>
            <h5 id="no-word" class="no-word d-none"></h5>
        </div>
    <div id="results" class="m-4">
        <h2 id="result-word"></h3>
        <button id="play-button" class="play-audio d-none">
            <img src="assets/volume.png" class="audio-image" id="audio-image">
        </button>
        <ul id="definitions"></ul>
        <div id="synonym-group" class="d-inline">
            <ul id="synonyms" class="list-group list-group-horizontal"></ul>
        </div>
        <h4 id="error-message" class="error d-none"></h4>
    </div>
    <script src="index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
